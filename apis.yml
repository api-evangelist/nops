    description: >-
      nOps is an AWS-focused cloud management platform that helps engineering and
      FinOps teams cut costs, improve governance, and keep environments well-architected.
      It ingests AWS billing and telemetry data (such as CUR, CloudTrail, and CloudWatch)
      to surface real-time insights, flag anomalies, and recommend actions like rightsizing,
      eliminating idle resources, scheduling non‑production workloads, optimizing
      EBS/S3, and increasing efficient use of Spot.
