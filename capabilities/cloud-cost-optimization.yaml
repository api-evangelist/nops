naftiko: 1.0.0-alpha2
info:
  label: nOps Cloud Cost Optimization
  description: Unified cloud cost optimization capability combining MAP migration tracking, scheduler automation, and cost
    recommendations. Used by FinOps teams and cloud operations engineers.
  tags:
  - nOps
  - FinOps
  - Cloud Costs
  - Optimization
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    NOPS_API_KEY: NOPS_API_KEY
capability:
  consumes:
  - type: http
    namespace: nops
    baseUri: https://app.nops.io
    description: nOps public API for MAP migration and scheduler operations.
    authentication:
      type: apikey
      key: X-Nops-Api-Key
      value: '{{NOPS_API_KEY}}'
      placement: header
    resources:
    - name: map-migration
      path: /c/v3/map-migration
      description: MAP Migration operations
      operations:
      - name: list-map-projects
        method: GET
        description: List MAP migration projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-map-project
        method: GET
        description: Get MAP migration project details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-map-products
        method: GET
        description: List products in a MAP project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-map-resources
        method: GET
        description: List resources in a MAP project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: scheduler
      path: /svc
      description: Essentials scheduler operations
      operations:
      - name: get-workload-recommendations
        method: GET
        description: Get scheduler workload recommendations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-workload-summary
        method: GET
        description: Get scheduler workload summary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-utilization-recommendations
        method: GET
        description: Get utilization recommendations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-utilization-summary
        method: GET
        description: Get utilization summary
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-scheduler
        method: POST
        description: Create a scheduler
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: trigger-scheduler
        method: POST
        description: Manually trigger a scheduler
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: enable-scheduler
        method: POST
        description: Enable a scheduler
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: disable-scheduler
        method: POST
        description: Disable a scheduler
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: cloud-cost-optimization-api
    description: Unified REST API for nOps cloud cost optimization.
    resources:
    - path: /v1/map-projects
      name: map-projects
      description: MAP migration projects
      operations:
      - method: GET
        name: list-map-projects
        description: List MAP migration projects
        call: nops.list-map-projects
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: cloud-cost-optimization-mcp
    transport: http
    description: MCP server for AI-assisted cloud cost optimization.
    tools:
    - name: list-map-projects
      description: List MAP migration projects
      hints:
        readOnly: true
      call: nops.list-map-projects
      outputParameters:
      - type: object
        mapping: $.
    - name: get-map-project
      description: Get MAP migration project details
      hints:
        readOnly: true
      call: nops.get-map-project
      outputParameters:
      - type: object
        mapping: $.
    - name: list-map-products
      description: List products in a MAP project
      hints:
        readOnly: true
      call: nops.list-map-products
      outputParameters:
      - type: object
        mapping: $.
    - name: list-map-resources
      description: List resources in a MAP project
      hints:
        readOnly: true
      call: nops.list-map-resources
      outputParameters:
      - type: object
        mapping: $.
    - name: get-workload-recommendations
      description: Get scheduler workload recommendations
      hints:
        readOnly: true
      call: nops.get-workload-recommendations
      outputParameters:
      - type: object
        mapping: $.
    - name: get-workload-summary
      description: Get scheduler workload summary
      hints:
        readOnly: true
      call: nops.get-workload-summary
      outputParameters:
      - type: object
        mapping: $.
    - name: get-utilization-recommendations
      description: Get utilization recommendations
      hints:
        readOnly: true
      call: nops.get-utilization-recommendations
      outputParameters:
      - type: object
        mapping: $.
    - name: get-utilization-summary
      description: Get utilization summary
      hints:
        readOnly: true
      call: nops.get-utilization-summary
      outputParameters:
      - type: object
        mapping: $.
    - name: create-scheduler
      description: Create a scheduler
      call: nops.create-scheduler
      outputParameters:
      - type: object
        mapping: $.
    - name: trigger-scheduler
      description: Manually trigger a scheduler
      call: nops.trigger-scheduler
      outputParameters:
      - type: object
        mapping: $.
    - name: enable-scheduler
      description: Enable a scheduler
      call: nops.enable-scheduler
      outputParameters:
      - type: object
        mapping: $.
    - name: disable-scheduler
      description: Disable a scheduler
      call: nops.disable-scheduler
      outputParameters:
      - type: object
        mapping: $.
